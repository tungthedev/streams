name: Release

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify:ci

      - name: Conformance
        run: bun run test:conformance

      - name: Local Conformance
        run: bun run test:conformance:local

      - name: Package Smoke Tests
        run: |
          bun run test:node-local-package
          bun run test:bun-local-package
          bun run test:bun-server-package

  mac-smoke:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Package Smoke Tests
        run: |
          bun run test:node-local-package
          bun run test:bun-local-package
          bun run test:bun-server-package

  publish:
    runs-on: macos-latest
    needs:
      - validate
      - mac-smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Publishable Packages
        run: bun run build:npm-packages

      - name: Publish @tungthedev/streams-local
        run: npm publish --provenance --access public ./dist/npm/streams-local

      - name: Publish @tungthedev/streams-server
        run: npm publish --provenance --access public ./dist/npm/streams-server
